<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация — Арина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/register.css') }}">
</head>
<body class="auth-page">
    <main class="auth-card auth-card-compact">
        <h1 class="auth-title">Авторизация</h1>

        <form id="loginForm" class="auth-form" novalidate>
            <div class="auth-field">
                <label for="loginEmail">Логин</label>
                <input type="email" id="loginEmail" name="login" autocomplete="email" maxlength="100" placeholder="Логин">
            </div>

            <div class="auth-field">
                <label for="loginPassword">Пароль</label>
                <div class="auth-password-wrapper">
                    <input type="password" id="loginPassword" name="password" autocomplete="current-password" maxlength="20" placeholder="Пароль">
                    <button type="button" class="auth-eye-btn" aria-label="Показать пароль" onclick="togglePassword('loginPassword', this)">👁</button>
                </div>
            </div>

            <div class="remember-row">
                <label for="rememberMe" class="remember-label">
                    <input type="checkbox" id="rememberMe" name="remember_me">
                    <span>Запомнить меня</span>
                </label>
            </div>

            <div class="captcha-row" id="captchaRow" style="display: none;">
                <label for="captchaAnswer">Проверка на человека</label>
                <div class="captcha-question" id="captchaQuestion"></div>
                <input type="number" id="captchaAnswer" name="captcha_answer" autocomplete="off">
                <div class="field-error" id="captchaError"></div>
            </div>

            <button type="submit" class="auth-submit-btn">Войти</button>
            <div class="form-message" id="loginMessage"></div>
        </form>

        <div class="auth-links auth-links-center">
            <a href="/auth/forgot-password">Забыли пароль?</a>
        </div>

        <div class="auth-register-block">
            <div>Впервые на сайте?</div>
            <a href="/auth/register">Зарегистрироваться</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
