<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля — Арина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/register.css') }}">
</head>
<body>
    <div class="container auth-container">
        <h1 class="subject-title">Восстановить пароль</h1>
        <p class="auth-intro">Введите почту, указанную при регистрации. Мы отправим ссылку для замены пароля.</p>

        <form id="forgotPasswordForm" class="registration-form" novalidate>
            <div class="form-row">
                <label for="forgotEmail">
                    <span class="hint-icon" title="Обязательное поле. Формат: text@example.ru. Только латиница.">!</span>
                    Почта
                </label>
                <input type="email" id="forgotEmail" name="email" autocomplete="email" maxlength="100">
                <div class="field-error" id="forgotEmailError"></div>
            </div>

            <button type="submit" class="submit-btn">Отправить</button>
            <div class="form-message" id="forgotMessage"></div>
        </form>

        <div class="auth-actions">
            <a href="/auth/login" class="back-btn">Назад ко входу</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/forgot-password.js') }}"></script>
</body>
</html>
