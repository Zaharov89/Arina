<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля — Арина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/register.css') }}">
</head>
<body class="auth-page auth-forgot-page">
    <main class="auth-card auth-forgot-card">
        <h1 class="auth-title">Восстановление пароля</h1>

        <form id="forgotPasswordForm" class="auth-form" novalidate>
            <div class="auth-field auth-field-plain">
                <div class="auth-input-wrapper">
                    <input type="email" id="forgotEmail" name="email" autocomplete="email" maxlength="100" placeholder="Электронная почта">
                </div>
                <div class="field-error" id="forgotEmailError"></div>
            </div>

            <button type="submit" class="auth-submit-btn">Восстановить пароль</button>
            <div class="form-message" id="forgotMessage"></div>
        </form>

        <div class="auth-bottom-links">
            <div>
                <span>Впервые на сайте?</span>
                <a href="/auth/register">Зарегистрироваться</a>
            </div>
            <div>
                <span>Уже есть аккаунт?</span>
                <a href="/auth/login">Авторизоваться</a>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/forgot-password.js') }}"></script>
</body>
</html>
