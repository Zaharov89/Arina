<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля — Арина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/register.css') }}">
</head>
<body class="auth-page">
    <main class="auth-card auth-card-compact">
        <h1 class="auth-title">Восстановить пароль</h1>
        <p class="auth-intro">Введите почту, указанную при регистрации. Мы отправим ссылку для замены пароля.</p>

        <form id="forgotPasswordForm" class="auth-form" novalidate>
            <div class="auth-field">
                <label for="forgotEmail">Почта</label>
                <div class="auth-input-wrapper">
                    <input type="email" id="forgotEmail" name="email" autocomplete="email" maxlength="100" placeholder="Почта">
                    <span class="hint-icon" tabindex="0" title="Обязательное поле. Формат: text@example.ru. Только латиница.">!</span>
                </div>
                <div class="field-error" id="forgotEmailError"></div>
            </div>

            <button type="submit" class="auth-submit-btn">Отправить</button>
            <div class="form-message" id="forgotMessage"></div>
        </form>

        <div class="auth-links auth-links-center">
            <a href="/auth/login">Назад ко входу</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/forgot-password.js') }}"></script>
</body>
</html>
