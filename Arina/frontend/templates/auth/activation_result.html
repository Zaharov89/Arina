<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} — Арина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/register.css') }}">
</head>
<body>
    <div class="container auth-container">
        <div class="activation-box activation-{{ status }}">
            <h1>{{ title }}</h1>
            <p>{{ message }}</p>

            {% if tokens %}
                <div class="token-box">
                    <h3>Тестовые токены для локальной проверки</h3>
                    <p>В продакшене они будут сохраняться на клиенте безопасным способом после входа.</p>
                    <label>Access token</label>
                    <textarea readonly>{{ tokens.access_token }}</textarea>
                    <label>Refresh token</label>
                    <textarea readonly>{{ tokens.refresh_token }}</textarea>
                </div>
            {% endif %}

            <a href="/" class="submit-btn activation-link">На главную</a>
        </div>
    </div>
</body>
</html>
