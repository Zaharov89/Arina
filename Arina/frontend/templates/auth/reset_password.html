<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Замена пароля — Арина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/register.css') }}">
</head>
<body>
    <div class="container auth-container">
        <h1 class="subject-title">Заменить пароль</h1>
        <p class="auth-intro">Введите новый пароль и повторите его.</p>

        <form id="resetPasswordForm" class="registration-form" data-token="{{ token }}" novalidate>
            <div class="form-row">
                <label for="newPassword">
                    <span class="hint-icon" title="От 8 до 20 символов. Минимум: 1 заглавная буква, 1 строчная буква, 1 цифра и 1 спецсимвол. Нельзя использовать старый пароль.">!</span>
                    Пароль
                </label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" name="password" autocomplete="new-password" maxlength="20">
                    <button type="button" class="eye-btn" onclick="togglePassword('newPassword')">👁</button>
                </div>
                <div class="field-error" id="newPasswordError"></div>
            </div>

            <div class="form-row">
                <label for="newPasswordRepeat">
                    <span class="hint-icon" title="Полное соответствие с паролем.">!</span>
                    Повторите пароль
                </label>
                <div class="password-wrapper">
                    <input type="password" id="newPasswordRepeat" name="password_repeat" autocomplete="new-password" maxlength="20">
                    <button type="button" class="eye-btn" onclick="togglePassword('newPasswordRepeat')">👁</button>
                </div>
                <div class="field-error" id="newPasswordRepeatError"></div>
            </div>

            <button type="submit" class="submit-btn">Заменить</button>
            <div class="form-message" id="resetMessage"></div>
        </form>

        <div class="auth-actions">
            <a href="/auth/login" class="back-btn">Назад ко входу</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/reset-password.js') }}"></script>
</body>
</html>
