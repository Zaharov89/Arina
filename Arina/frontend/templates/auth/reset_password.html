<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Замена пароля — Арина</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/register.css') }}">
</head>
<body class="auth-page">
    <main class="auth-card auth-card-compact">
        <h1 class="auth-title">Заменить пароль</h1>
        <p class="auth-intro">Введите новый пароль и повторите его.</p>

        <form id="resetPasswordForm" class="auth-form" data-token="{{ token }}" novalidate>
            <div class="auth-field">
                <label for="newPassword">
                    Пароль
                    <span class="hint-icon" title="От 8 до 20 символов. Минимум: 1 заглавная буква, 1 строчная буква, 1 цифра и 1 спецсимвол. Нельзя использовать старый пароль.">!</span>
                </label>
                <div class="auth-password-wrapper">
                    <input type="password" id="newPassword" name="password" autocomplete="new-password" maxlength="20" placeholder="Пароль">
                    <button type="button" class="auth-eye-btn" aria-label="Показать пароль" onclick="togglePassword('newPassword', this)">👁</button>
                </div>
                <div class="field-error" id="newPasswordError"></div>
            </div>

            <div class="auth-field">
                <label for="newPasswordRepeat">
                    Повторите пароль
                    <span class="hint-icon" title="Полное соответствие с паролем.">!</span>
                </label>
                <div class="auth-password-wrapper">
                    <input type="password" id="newPasswordRepeat" name="password_repeat" autocomplete="new-password" maxlength="20" placeholder="Повторите пароль">
                    <button type="button" class="auth-eye-btn" aria-label="Показать пароль" onclick="togglePassword('newPasswordRepeat', this)">👁</button>
                </div>
                <div class="field-error" id="newPasswordRepeatError"></div>
            </div>

            <button type="submit" class="auth-submit-btn">Заменить</button>
            <div class="form-message" id="resetMessage"></div>
        </form>

        <div class="auth-links auth-links-center">
            <a href="/auth/login">Назад ко входу</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/reset-password.js') }}"></script>
</body>
</html>
