<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Тренировка — Русский язык {{ test_settings.classNum }} класс</title><link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='russian/test.css') }}"></head><body><div id="dateTimeBar"></div><div class="container"><div id="topicTestBlock" class="test-block"><div class="question-counter" id="questionCounter">Задание №1 из {{ total_questions }}</div><div class="question-topic" id="questionTopic" style="display: none;"></div><div class="question-container"><div class="question-text" id="questionDisplay">Загрузка...</div>{% if test_settings.classNum == '1' %}<button class="question-sound-btn" type="button" onclick="speakQuestion('questionDisplay')">🔊 Прослушать</button>{% endif %}</div><input type="text" id="answerInput" class="answer-input" placeholder="Введите ответ" autocomplete="off"><div id="resultMessage" class="result-message"></div><div class="test-buttons"><button id="checkBtn" class="test-btn" onclick="checkRussianTopicAnswer()">Ответить</button>{% if test_settings.topicId == 'control_slice' %}<button id="notStudiedBtn" class="test-btn" onclick="skipNotStudiedRussianQuestion()">Еще не изучали</button>{% endif %}<button id="nextBtn" class="test-btn" onclick="nextRussianTopicQuestion()" disabled>Далее</button><button id="finishBtn" class="test-btn" onclick="finishRussianTopicTest()">Закончить тест</button></div><div style="text-align: center; margin-top: 20px;"><div class="test-timer" id="testTimer">Время: 0:00</div></div></div></div><script>window.russianTopicTestSettings = {{ test_settings | tojson }}; window.totalRussianTopicQuestions = {{ total_questions }};</script>{% if test_settings.classNum == '1' %}<script src="{{ url_for('static', filename='js/question-voice.js') }}"></script>{% endif %}<script src="{{ url_for('static', filename='js/russian-common.js') }}"></script><script>const originalFinishRussianTopicTest = finishRussianTopicTest; finishRussianTopicTest = function () { localStorage.setItem('resultSubjectCode', 'russian'); localStorage.setItem('resultClassNumber', window.russianTopicTestSettings?.classNum || '1'); localStorage.setItem('resultTopicCode', window.russianTopicTestSettings?.topicId || ''); originalFinishRussianTopicTest(); };</script><script src="{{ url_for('static', filename='js/question-unique-key.js') }}"></script><script src="{{ url_for('static', filename='js/russian-choice-radio.js') }}"></script><script src="{{ url_for('static', filename='js/enter-submit-next.js') }}"></script></body></html>
