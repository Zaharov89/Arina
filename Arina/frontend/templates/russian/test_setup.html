<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест — Настройка — Русский</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='russian/test-setup.css') }}">
</head>
<body>
    <div id="dateTimeBar"></div>
    <div class="container">
        <h1 class="subject-title">Русский язык</h1>
        <p id="directTopicNote" class="direct-topic-note" style="display: none;">Тренировка по выбранной теме. Класс и раздел уже выбраны в обучении.</p>

        <!-- Шаг 1: Выбор класса -->
        <div id="testStep1" class="settings-box">
            <h3>Настройки теста — Шаг 1/3</h3>
            <div class="settings-row">
                <div class="setting">
                    <label>Класс:</label>
                    <select id="classSelect">
                        <option value="1">1 класс</option>
                        <option value="2">2 класс</option>
                        <option value="3">3 класс</option>
                        <option value="all">Все слова 2–3 класса</option>
                    </select>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" onclick="goBackToMenu()">Назад</button>
                <button class="nav-btn next-btn" onclick="goToStep2()">Далее</button>
            </div>
        </div>

        <!-- Шаг 2: Тема 1 класса / пропуск для 2-3 -->
        <div id="testStep2" class="settings-box" style="display: none;">
            <h3>Настройки теста — Шаг 2/3</h3>
            <div class="settings-row" id="topicRow">
                <div class="setting">
                    <label>Раздел:</label>
                    <select id="topicSelect">
                        {% for topic in class_1_topics %}
                            <option value="{{ topic.id }}">{{ topic.title }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" onclick="goToStep1()">Назад</button>
                <button class="nav-btn next-btn" onclick="goToStep3()">Далее</button>
            </div>
        </div>

        <!-- Шаг 3: Количество заданий -->
        <div id="testStep3" class="settings-box" style="display: none;">
            <h3 id="questionCountStepTitle">Настройки теста — Шаг 3/3</h3>
            <div class="settings-row">
                <div class="setting">
                    <label id="questionCountLabel">Количество заданий:</label>
                    <div class="questions-options" id="wordCountButtons">
                        <button class="question-btn" data-count="10">10</button>
                        <button class="question-btn active" data-count="25">25</button>
                        <button class="question-btn" data-count="50">50</button>
                        <button class="question-btn" data-count="100">100</button>
                    </div>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" onclick="goBackFromRussianQuestionCount()">Назад</button>
                <button class="nav-btn next-btn" onclick="startRussianTest()">Начать тест</button>
            </div>
        </div>
    </div>

    <script>
        window.RUSSIAN_CLASS_1_TOPICS = {{ class_1_topics | tojson }};
        window.INITIAL_RUSSIAN_CLASS = "{{ request.args.get('class', '1') }}";
        window.INITIAL_RUSSIAN_TOPIC = "{{ request.args.get('type', '') }}";
        window.DIRECT_RUSSIAN_TOPIC_TEST = Boolean(window.INITIAL_RUSSIAN_CLASS === "1" && window.INITIAL_RUSSIAN_TOPIC);
    </script>
    <script src="{{ url_for('static', filename='js/russian-common.js') }}"></script>
    <script>
        document.getElementById('wordCountButtons').addEventListener('click', function(e) {
            if (e.target.classList.contains('question-btn')) {
                document.querySelectorAll('.question-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
            }
        });
    </script>
</body>
</html>
