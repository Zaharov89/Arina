<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест — Словарные слова</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='russian/test.css') }}">
</head>
<body>
    <div id="dateTimeBar"></div>
    <div class="container">
        {% if error_message %}
            <div class="test-block"><div class="result-message incorrect">{{ error_message }}</div><div class="test-buttons"><a href="/russian" class="test-btn">Вернуться в меню</a></div></div>
        {% else %}
            <div id="testBlock" class="test-block">
                <div class="question-counter" id="questionCounter">Слово №1 из {{ total_words }}</div>
                <div class="question-container"><button class="question-sound-btn" id="questionSoundBtn" onclick="speakCurrentWord()">Воспроизвести 🔊</button></div>
                <input type="text" id="answerInput" class="answer-input" placeholder="Введите слово">
                <div id="resultMessage" class="result-message"></div>
                <div class="test-buttons"><button id="checkBtn" class="test-btn" onclick="checkAnswer()">Ответить</button><button id="nextBtn" class="test-btn" onclick="nextQuestion()" disabled>Далее</button><button id="finishBtn" class="test-btn" onclick="finishTest()">Закончить тест</button></div>
                <div style="text-align: center; margin-top: 20px;"><div class="test-timer" id="testTimer">Время: 0:00</div></div>
            </div>
        {% endif %}
    </div>
    <script>
        window.testWords = {{ test_words | tojson }};
        window.totalWords = {{ total_words }};
        window.russianDictationClassNumber = "{{ request.args.get('class', '1') }}";
    </script>
    <script src="{{ url_for('static', filename='js/russian-common.js') }}"></script>
    <script>
        const originalFinishRussianDictationTest = finishTest;
        finishTest = function () {
            const classNumber = window.russianDictationClassNumber || '1';
            const topicCode = classNumber === '1' ? 'mini_dictations' : `vocabulary_words_${classNumber}`;
            localStorage.setItem('resultSubjectCode', 'russian');
            localStorage.setItem('resultClassNumber', classNumber);
            localStorage.setItem('resultTopicCode', topicCode);
            originalFinishRussianDictationTest();
        };
    </script>
    <script src="{{ url_for('static', filename='js/enter-submit-next.js') }}"></script>
</body>
</html>
