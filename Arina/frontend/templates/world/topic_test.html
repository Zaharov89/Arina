<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Тренировка — Окружающий мир {{ test_settings.classNum }} класс</title><link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='world/test.css') }}"></head><body><div id="dateTimeBar"></div><div class="container"><div id="worldTopicTestBlock" class="test-block"><div class="question-counter" id="questionCounter">Задание №1 из {{ total_questions }}</div><div class="question-topic" id="questionTopic" style="display: none;"></div><div class="question-container"><div class="question-text" id="questionDisplay">Загрузка...</div>{% if test_settings.classNum == '1' %}<button class="question-sound-btn" type="button" onclick="speakQuestion('questionDisplay')">🔊 Прослушать</button>{% endif %}</div><input type="text" id="answerInput" class="answer-input" placeholder="Введите ответ" autocomplete="off"><div id="resultMessage" class="result-message"></div><div class="test-buttons"><button id="checkBtn" class="test-btn" onclick="checkWorldTopicAnswer()">Ответить</button>{% if test_settings.topicId == 'control_slice' %}<button id="notStudiedBtn" class="test-btn" onclick="skipNotStudiedWorldQuestion()">Еще не изучали</button>{% endif %}<button id="nextBtn" class="test-btn" onclick="nextWorldTopicQuestion()" disabled>Далее</button><button id="finishBtn" class="test-btn" onclick="finishWorldTopicTest()">Закончить тест</button></div><div style="text-align: center; margin-top: 20px;"><div class="test-timer" id="testTimer">Время: 0:00</div></div></div></div><script>window.worldTopicTestSettings = {{ test_settings | tojson }}; window.totalWorldTopicQuestions = {{ total_questions }};</script>{% if test_settings.classNum == '1' %}<script src="{{ url_for('static', filename='js/question-voice.js') }}"></script>{% endif %}<script src="{{ url_for('static', filename='js/world-common.js') }}"></script><script>let notStudiedAnswers = 0; function skipNotStudiedWorldQuestion(){ notStudiedAnswers++; currentQuestion++; if (currentQuestion > totalQuestions) finishWorldTopicTest(); else generateWorldTopicQuestion(); } const originalFinishWorldTopicTest = finishWorldTopicTest; finishWorldTopicTest = function () { const originalTotalQuestions = totalQuestions; totalQuestions = Math.max(0, totalQuestions - notStudiedAnswers); localStorage.setItem('notStudiedAnswers', notStudiedAnswers); localStorage.setItem('resultSubjectCode', 'world'); localStorage.setItem('resultClassNumber', window.worldTopicTestSettings?.classNum || '1'); localStorage.setItem('resultTopicCode', window.worldTopicTestSettings?.topicId || ''); originalFinishWorldTopicTest(); totalQuestions = originalTotalQuestions; };</script><script src="{{ url_for('static', filename='js/question-unique-key.js') }}"></script><script src="{{ url_for('static', filename='js/world-choice-radio.js') }}"></script><script src="{{ url_for('static', filename='js/enter-submit-next.js') }}"></script></body></html>
