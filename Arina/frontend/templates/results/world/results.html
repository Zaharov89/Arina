<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Результаты теста — Окружающий мир</title><link rel="stylesheet" href="{{ url_for('static', filename='results/math/results.css') }}"></head>
<body>
<div id="dateTimeBar"></div>
<div class="container"><div class="main-box"><h3 class="result-title" id="resultTitle">Результаты теста — Окружающий мир</h3><div class="stats-container"><div class="stats-left"><div class="results-grid"><div class="result-item correct-answers"><div class="result-label">Правильных ответов</div><div class="result-value" id="correctAnswersValue">0 из 0</div></div><div class="result-item percentage"><div class="result-label">Процент правильных ответов</div><div class="result-value" id="percentageValue">0%</div></div><div class="result-item time-stats"><div class="result-label">Среднее время на ответ</div><div class="result-value" id="avgTimeValue">0.0 сек</div></div><div class="result-item record"><div class="result-label">Длительность тренировки</div><div class="result-value" id="totalTimeValue">0 секунд</div></div></div></div><div class="grade-box"><div class="grade-label">Общая оценка</div><div class="grade" id="finalGrade">5</div></div></div><div class="divider"></div><div class="section-title">Ошибки:</div><div class="wrong-list" id="testWrongAnswersBlock"></div></div><div class="buttons-container"><a href="/world" class="btn menu-btn">Вернуться в меню</a><a href="/subjects?student={{ student }}" class="btn menu-btn">К предметам</a></div></div>
<script>
function renderDateBar(){const now=new Date();const monthsRu=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];document.getElementById('dateTimeBar').textContent=`${now.getDate()} ${monthsRu[now.getMonth()]} ${now.getFullYear()} года ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;}
function calculateGradeByScore(scorePercent){if(scorePercent>=95)return 5;if(scorePercent>=85)return 4;if(scorePercent>=70)return 3;return 2;}
function formatTime(seconds){seconds=parseInt(seconds)||0;const mins=Math.floor(seconds/60);const secs=seconds%60;if(mins===0)return `${secs} секунд`;return `${mins} мин ${secs} сек`;}
renderDateBar();const totalQuestions=parseInt(localStorage.getItem('totalQuestions'))||0;const correctAnswers=parseInt(localStorage.getItem('correctAnswers'))||0;const wrongAnswers=parseInt(localStorage.getItem('wrongAnswers'))||0;const storedEmptyAnswers=parseInt(localStorage.getItem('emptyAnswers'))||0;const skippedAnswers=Math.max(0,totalQuestions-correctAnswers-wrongAnswers-storedEmptyAnswers);const emptyAnswers=storedEmptyAnswers+skippedAnswers;const totalTime=parseInt(localStorage.getItem('timeSpent'))||0;const avgTime=localStorage.getItem('averageTime')||'0.0';const wrongList=JSON.parse(localStorage.getItem('wrongAnswersList')||'[]');const percentage=totalQuestions>0?Math.round((correctAnswers/totalQuestions)*100):0;document.getElementById('correctAnswersValue').textContent=`${correctAnswers} из ${totalQuestions}`;document.getElementById('percentageValue').textContent=`${percentage}%`;document.getElementById('avgTimeValue').textContent=`${avgTime} сек`;document.getElementById('totalTimeValue').textContent=formatTime(totalTime);document.getElementById('finalGrade').textContent=calculateGradeByScore(percentage);const wrongBlock=document.getElementById('testWrongAnswersBlock');const skippedHtml=emptyAnswers>0?`<div class="wrong-item"><strong>Пропущено заданий: ${emptyAnswers}</strong><br>Пропущенные задания считаются ошибками.</div>`:'';if(wrongList.length===0){wrongBlock.innerHTML=skippedHtml||'<p>Ошибок нет. Отлично!</p>';}else{wrongBlock.innerHTML=skippedHtml+wrongList.map(item=>`<div class="wrong-item"><strong>${item.question||'Задание'}</strong><br>Ваш ответ: ${item.userAnswer}<br>Правильный ответ: ${item.correctAnswer}</div>`).join('');}
</script>
<script src="{{ url_for('static', filename='js/results-save.js') }}"></script><script>document.addEventListener('DOMContentLoaded',function(){if(typeof saveTestAttemptResult==='function'){saveTestAttemptResult('world',localStorage.getItem('resultClassNumber')||'1',localStorage.getItem('resultTopicCode')||'');}});</script>
</body></html>
