<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест — Настройка — Английский</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='english/test-setup.css') }}">
</head>
<body>
    <div id="dateTimeBar"></div>
    <div class="container">
        <h1 class="subject-title">Английский язык</h1>

        <!-- Шаг 1: Выбор класса -->
        <div id="testStep1" class="settings-box">
            <h3>Настройки теста — Шаг 1/3</h3>
            <div class="settings-row">
                <div class="setting">
                    <label>Класс:</label>
                    <select id="classSelect">
                        <option value="2">2 класс</option>
                        <option value="3">3 класс</option>
                        <option value="all">Все классы</option>
                    </select>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" onclick="goBackToMenu()">Назад</button>
                <button class="nav-btn next-btn" onclick="goToStep2()">Далее</button>
            </div>
        </div>

        <!-- Шаг 2: Тип теста -->
        <div id="testStep2" class="settings-box" style="display: none;">
            <h3>Настройки теста — Шаг 2/3</h3>
            <div class="settings-row">
                <div class="setting">
                    <label>Тип теста:</label>
                    <select id="testTypeSelect">
                        <option value="ru_to_en">Перевод только на английский язык</option>
                        <option value="en_to_ru">Перевод только на русский язык</option>
                        <option value="mixed" selected>Все подряд</option>
                    </select>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" onclick="goToStep1()">Назад</button>
                <button class="nav-btn next-btn" onclick="goToStep3()">Далее</button>
            </div>
        </div>

        <!-- Шаг 3: Количество слов -->
        <div id="testStep3" class="settings-box" style="display: none;">
            <h3>Настройки теста — Шаг 3/3</h3>
            <div class="settings-row">
                <div class="setting">
                    <label>Количество слов:</label>
                    <div class="questions-options" id="wordCountButtons">
                        <button class="question-btn active" data-count="25">25</button>
                        <button class="question-btn" data-count="50">50</button>
                        <button class="question-btn" data-count="100">100</button>
                    </div>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" onclick="goToStep2()">Назад</button>
                <button class="nav-btn next-btn" onclick="startEnglishTest()">Начать тест</button>
            </div>
        </div>
    </div>

    <script>
        window.INITIAL_ENGLISH_CLASS = "{{ request.args.get('class', 'all') }}";
        document.addEventListener('DOMContentLoaded', function () {
            const classSelect = document.getElementById('classSelect');
            if (classSelect && window.INITIAL_ENGLISH_CLASS) {
                const optionExists = Array.from(classSelect.options).some(option => option.value === window.INITIAL_ENGLISH_CLASS);
                classSelect.value = optionExists ? window.INITIAL_ENGLISH_CLASS : 'all';
            }
        });

        // Обработчик выбора количества слов
        document.getElementById('wordCountButtons').addEventListener('click', function(e) {
            if (e.target.classList.contains('question-btn')) {
                document.querySelectorAll('.question-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
            }
        });
    </script>
    <script src="{{ url_for('static', filename='js/english-common.js') }}"></script>
</body>
</html>
