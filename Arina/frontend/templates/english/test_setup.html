<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Тест — Слова для заучивания</title><link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='english/test-setup.css') }}"></head>
<body><div id="dateTimeBar"></div><div class="container"><h1 class="subject-title">Слова для заучивания</h1><input type="hidden" id="classSelect" value="{{ request.args.get('class', '2') }}"><input type="hidden" id="testTypeSelect" value="mixed"><div id="testStep1" style="display:none;"></div><div id="testStep2" style="display:none;"></div><div id="testStep3" class="settings-box"><h3>Настройки теста — Шаг 1/1</h3><div class="settings-row"><div class="setting"><label>Количество слов:</label><div class="questions-options" id="wordCountButtons"><button class="question-btn" data-count="10">10</button><button class="question-btn active" data-count="25">25</button><button class="question-btn" data-count="50">50</button></div></div></div><div class="nav-buttons"><button class="nav-btn prev-btn" onclick="goBackToEnglishVocabularyMenu()">Назад</button><button class="nav-btn next-btn" onclick="startEnglishTest()">Начать тест</button></div></div></div><script>window.INITIAL_ENGLISH_CLASS="{{ request.args.get('class', '2') }}";function goBackToEnglishVocabularyMenu(){const student=new URLSearchParams(window.location.search).get('student')||'Арина';window.location.href=`/english/vocabulary-menu?class=${window.INITIAL_ENGLISH_CLASS||'2'}&student=${encodeURIComponent(student)}`;}document.addEventListener('DOMContentLoaded',function(){const classSelect=document.getElementById('classSelect');if(classSelect)classSelect.value=window.INITIAL_ENGLISH_CLASS||'2';});document.getElementById('wordCountButtons').addEventListener('click',function(e){if(e.target.classList.contains('question-btn')){document.querySelectorAll('.question-btn').forEach(btn=>btn.classList.remove('active'));e.target.classList.add('active');}});</script><script src="{{ url_for('static', filename='js/english-common.js') }}"></script></body></html>
