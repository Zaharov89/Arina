<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Дневник ученика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='diary/diary.css') }}">
</head>
<body>
    <div class="container">
        <h2 id="pageTitle">Загрузка дневника...</h2>
        <div id="statsContent"></div>
        <a href="/subjects?student={{ request.args.get('student', 'Арина') }}" class="back-btn">← Назад</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const studentName = urlParams.get('student');

        if (!studentName) {
            document.getElementById('pageTitle').textContent = 'Ошибка';
            document.getElementById('statsContent').innerHTML = `
                <p style="color: red;">Не указан ученик (параметр 'student')</p>
                <a href="/subjects" class="back-btn">← Назад к предметам</a>
            `;
        } else {
            document.getElementById('pageTitle').textContent = `Дневник: ${studentName}`;
        }

        if (studentName) {
            fetch(`/api/stats?student=${encodeURIComponent(studentName)}`)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (data.error) {
                        document.getElementById('statsContent').innerHTML = `<p style="color: red;">Ошибка: ${data.error}</p>`;
                        return;
                    }

                    let html = '';
                    function formatGrade(value) {
                        if (value === 0) return "0";
                        return parseFloat(value).toFixed(1).replace('.', ',');
                    }

                    // Математика
                    html += `
                        <div class="subject-stats">
                            <h3>Математика</h3>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div>Средний бал (месяц)</div>
                                    <div class="stat-value">${formatGrade(data.math?.month_avg || 0)}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Дней (месяц)</div>
                                    <div class="stat-value">${data.math?.month_days || 0}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Средний бал (год)</div>
                                    <div class="stat-value">${formatGrade(data.math?.year_avg || 0)}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Дней (год)</div>
                                    <div class="stat-value">${data.math?.year_days || 0}</div>
                                </div>
                            </div>
                        </div>
                    `;

                    // Русский язык
                    html += `
                        <div class="subject-stats">
                            <h3>Русский язык</h3>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div>Средний бал (месяц)</div>
                                    <div class="stat-value">${formatGrade(data.russian?.month_avg || 0)}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Дней (месяц)</div>
                                    <div class="stat-value">${data.russian?.month_days || 0}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Средний бал (год)</div>
                                    <div class="stat-value">${formatGrade(data.russian?.year_avg || 0)}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Дней (год)</div>
                                    <div class="stat-value">${data.russian?.year_days || 0}</div>
                                </div>
                            </div>
                        </div>
                    `;

                    // Английский язык
                    html += `
                        <div class="subject-stats">
                            <h3>Английский язык</h3>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div>Средний бал (месяц)</div>
                                    <div class="stat-value">${formatGrade(data.english?.month_avg || 0)}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Дней (месяц)</div>
                                    <div class="stat-value">${data.english?.month_days || 0}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Средний бал (год)</div>
                                    <div class="stat-value">${formatGrade(data.english?.year_avg || 0)}</div>
                                </div>
                                <div class="stat-item">
                                    <div>Дней (год)</div>
                                    <div class="stat-value">${data.english?.year_days || 0}</div>
                                </div>
                            </div>
                        </div>
                    `;

                    document.getElementById('statsContent').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('statsContent').innerHTML = `<p style="color: red;">Ошибка загрузки данных: ${err.message}</p>`;
                });
        }
    </script>
</body>
</html>
