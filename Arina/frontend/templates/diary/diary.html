<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Дневник ученика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='diary/diary.css') }}">
</head>
<body>
    <div id="dateTimeBar"></div>
    <div class="container diary-container">
        <h2 id="pageTitle">Дневник</h2>
        <p class="diary-subtitle">Выберите предмет, чтобы посмотреть оценки по темам за текущий месяц.</p>
        <div id="statsContent" class="diary-loading">Загрузка дневника...</div>
        <a href="/subjects" class="back-btn">← Назад</a>
    </div>

    <script>
        const SUBJECT_ICONS = {
            math: '🔢',
            russian: '✍️',
            world: '🌍',
            english: '🇬🇧',
        };

        function getAuthStorageForDiary() {
            if (localStorage.getItem('arinaAccessToken')) return localStorage;
            if (sessionStorage.getItem('arinaAccessToken')) return sessionStorage;
            return null;
        }

        function getDiaryAccessToken() {
            const storage = getAuthStorageForDiary();
            return storage ? storage.getItem('arinaAccessToken') : '';
        }

        function renderDateBar() {
            const dateTimeBar = document.getElementById('dateTimeBar');
            if (!dateTimeBar) return;
            const now = new Date();
            const monthsRu = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
            dateTimeBar.textContent = `${now.getDate()} ${monthsRu[now.getMonth()]} ${now.getFullYear()} года ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        }

        function formatGrade(value) {
            const numberValue = Number(value || 0);
            if (!numberValue) return '0';
            return numberValue.toFixed(1).replace('.', ',');
        }

        function formatDate(value) {
            if (!value) return '—';
            const parts = String(value).split('-');
            if (parts.length !== 3) return value;
            return `${parts[2]}.${parts[1]}`;
        }

        function gradeClass(grade) {
            return grade ? `grade-pill grade-${grade}` : 'grade-empty';
        }

        function renderGradesTimeline(grades) {
            if (!grades || grades.length === 0) {
                return '<span class="no-grade">Нет оценок</span>';
            }
            return grades.map(item => `<span class="${gradeClass(item.grade)}" title="${formatDate(item.date)}">${item.grade}</span>`).join('');
        }

        function renderSubjectCards(subjects) {
            return `
                <div class="diary-subject-tabs" id="diarySubjectTabs">
                    ${subjects.map((subject, index) => `
                        <button type="button" class="diary-subject-tab ${index === 0 ? 'active' : ''}" data-subject-code="${subject.code}">
                            <span class="subject-icon">${SUBJECT_ICONS[subject.code] || '📘'}</span>
                            <span>${subject.title}</span>
                            <small>Средний бал: ${formatGrade(subject.month_avg)}</small>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function renderSubjectPanel(subject, isActive) {
            const topics = subject.topics || [];
            const filledTopics = topics.filter(topic => topic.month_grades && topic.month_grades.length > 0).length;
            return `
                <section class="diary-subject-panel ${isActive ? 'active' : ''}" data-subject-panel="${subject.code}">
                    <div class="diary-summary-card">
                        <div>
                            <h3>${SUBJECT_ICONS[subject.code] || '📘'} ${subject.title}</h3>
                            <p>Тем с оценками в этом месяце: ${filledTopics} из ${topics.length}</p>
                        </div>
                        <div class="summary-values">
                            <div><span>${formatGrade(subject.month_avg)}</span><small>средний балл за месяц</small></div>
                            <div><span>${subject.month_days || 0}</span><small>дней с оценками</small></div>
                            <div><span>${formatGrade(subject.year_avg)}</span><small>средний балл за год</small></div>
                        </div>
                    </div>

                    <div class="diary-table-wrap">
                        <table class="diary-topic-table">
                            <thead>
                                <tr>
                                    <th>Тема</th>
                                    <th>Оценки за месяц</th>
                                    <th>Средний балл</th>
                                    <th>Лучшая</th>
                                    <th>Последняя</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${topics.length ? topics.map(topic => `
                                    <tr class="${topic.month_grades && topic.month_grades.length ? '' : 'empty-topic-row'}">
                                        <td>
                                            <div class="topic-title">${topic.topic_title}</div>
                                            ${topic.class_number ? `<div class="topic-class">${topic.class_number} класс</div>` : ''}
                                        </td>
                                        <td><div class="grades-timeline">${renderGradesTimeline(topic.month_grades)}</div></td>
                                        <td>${topic.month_avg ? formatGrade(topic.month_avg) : '—'}</td>
                                        <td>${topic.best_grade ? `<span class="${gradeClass(topic.best_grade)}">${topic.best_grade}</span>` : '—'}</td>
                                        <td>${topic.last_grade ? `<span class="${gradeClass(topic.last_grade)}">${topic.last_grade}</span><div class="last-date">${formatDate(topic.last_date)}</div>` : '—'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr><td colspan="5" class="empty-diary">Темы пока не добавлены в БД.</td></tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </section>
            `;
        }

        function activateSubject(code) {
            document.querySelectorAll('.diary-subject-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.subjectCode === code);
            });
            document.querySelectorAll('.diary-subject-panel').forEach(panel => {
                panel.classList.toggle('active', panel.dataset.subjectPanel === code);
            });
        }

        function renderDiary(data) {
            const content = document.getElementById('statsContent');
            const subjects = data.subjects || [];
            if (!subjects.length) {
                content.innerHTML = '<div class="empty-diary">В дневнике пока нет предметов.</div>';
                return;
            }
            content.className = 'diary-content';
            content.innerHTML = `
                ${renderSubjectCards(subjects)}
                <div class="diary-panels">
                    ${subjects.map((subject, index) => renderSubjectPanel(subject, index === 0)).join('')}
                </div>
            `;
            document.querySelectorAll('.diary-subject-tab').forEach(tab => {
                tab.addEventListener('click', () => activateSubject(tab.dataset.subjectCode));
            });
        }

        async function loadDiary() {
            const token = getDiaryAccessToken();
            if (!token) {
                document.getElementById('statsContent').innerHTML = '<p style="color: red;">Нужно авторизоваться, чтобы открыть дневник.</p>';
                return;
            }

            try {
                const response = await fetch('/api/stats', {
                    headers: { 'Authorization': `Bearer ${token}` },
                });
                const data = await response.json();
                if (!response.ok || data.error) {
                    document.getElementById('statsContent').innerHTML = `<p style="color: red;">Ошибка: ${data.error || data.message || response.status}</p>`;
                    return;
                }
                renderDiary(data);
            } catch (error) {
                document.getElementById('statsContent').innerHTML = `<p style="color: red;">Ошибка загрузки данных: ${error.message}</p>`;
            }
        }

        renderDateBar();
        loadDiary();
    </script>
</body>
</html>
