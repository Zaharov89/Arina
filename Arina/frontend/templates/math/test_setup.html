<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест — Настройка — Математика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='math/test-setup.css') }}">
</head>
<body>
    <div id="dateTimeBar"></div>
    <div class="container">
        <h1 class="subject-title">Математика</h1>
        <div id="testStep1" class="settings-box">
            <h3>Настройки теста — Шаг 1/4</h3>
            <div class="settings-row"><div class="setting"><label>Класс:</label><select id="classSelect"><option value="1">1 класс</option><option value="2">2 класс</option><option value="3">3 класс</option></select></div></div>
            <div class="nav-buttons"><button class="nav-btn prev-btn" onclick="goBackToMenu()">Назад</button><button class="nav-btn next-btn" onclick="goToStep2()">Далее</button></div>
        </div>
        <div id="testStep2" class="settings-box" style="display: none;">
            <h3>Настройки теста — Шаг 2/4</h3>
            <div class="settings-row"><div class="setting"><label id="typeSelectLabel">Раздел:</label><select id="typeSelect">{% for topic in class_1_topics %}<option value="{{ topic.id }}">{{ topic.title }}</option>{% endfor %}</select></div></div>
            <div class="settings-row" id="tableRow" style="display: none;"><div class="setting"><label>Таблица умножения:</label><select id="tableSelect"><option value="all">Все таблицы</option><option value="2">Таблица на 2</option><option value="3">Таблица на 3</option><option value="4">Таблица на 4</option><option value="5">Таблица на 5</option><option value="6">Таблица на 6</option><option value="7">Таблица на 7</option><option value="8">Таблица на 8</option><option value="9">Таблица на 9</option></select></div></div>
            <div class="settings-row" id="advancedOptions" style="display: none;"><div class="setting"><div class="checkbox-container"><input type="checkbox" id="includeEquations"><label for="includeEquations">Включать уравнения</label></div></div><div class="setting"><div class="checkbox-container"><input type="checkbox" id="includeParentheses"><label for="includeParentheses">Включать сложные примеры</label></div></div></div>
            <div class="nav-buttons"><button class="nav-btn prev-btn" onclick="goToStep1()">Назад</button><button class="nav-btn next-btn" onclick="goToStep3()">Далее</button></div>
        </div>
        <div id="testStep3" class="settings-box" style="display: none;"><h3 id="questionCountStepTitle">Настройки теста — Шаг 3/4</h3><div class="settings-row"><div class="setting"><label>Количество вопросов:</label><div class="questions-options"><button class="question-btn" onclick="selectQuestionCount(10)">10</button><button class="question-btn active" onclick="selectQuestionCount(25)">25</button><button class="question-btn" onclick="selectQuestionCount(50)">50</button></div></div></div><div class="nav-buttons"><button class="nav-btn prev-btn" onclick="goBackFromQuestionCount()">Назад</button><button class="nav-btn next-btn" onclick="goToStep4()">Далее</button></div></div>
        <div id="testStep4" class="settings-box" style="display: none;"><h3 id="speedStepTitle">Настройки теста — Шаг 4/4</h3><div class="settings-row"><div class="setting"><label>Решаем на скорость?</label></div></div><div class="nav-buttons"><button class="nav-btn next-btn" id="speedYesBtn">Да</button><button class="nav-btn next-btn" id="speedNoBtn">Нет</button></div></div>
    </div>
    <script>
        window.CLASS_1_MATH_TOPICS = {{ class_1_topics | tojson }};
        window.CLASS_2_MATH_TOPICS = {{ class_2_topics | tojson }};
        window.INITIAL_MATH_TYPE = "{{ request.args.get('type', '') }}";
        window.INITIAL_MATH_CLASS = "{{ request.args.get('class', '1') }}";
        window.DIRECT_TOPIC_TEST = Boolean((window.INITIAL_MATH_CLASS === "1" || window.INITIAL_MATH_CLASS === "2") && window.INITIAL_MATH_TYPE);
    </script>
    <script src="{{ url_for('static', filename='js/math-common.js') }}"></script>
    <script>
        function goBackFromQuestionCount() {
            const student = new URLSearchParams(window.location.search).get('student') || 'Арина';
            if (window.DIRECT_TOPIC_TEST && window.INITIAL_MATH_TYPE) { window.location.href = `/math/learning/topic/${window.INITIAL_MATH_TYPE}?class=${window.INITIAL_MATH_CLASS}&student=${encodeURIComponent(student)}`; return; }
            goToStep2();
        }
        document.addEventListener('DOMContentLoaded', function () {
            if (!window.DIRECT_TOPIC_TEST) return;
            const classSelect = document.getElementById('classSelect'); const typeSelect = document.getElementById('typeSelect'); const step1 = document.getElementById('testStep1'); const step2 = document.getElementById('testStep2'); const step3 = document.getElementById('testStep3'); const step4 = document.getElementById('testStep4'); const questionCountTitle = document.getElementById('questionCountStepTitle'); const speedTitle = document.getElementById('speedStepTitle');
            if (classSelect) classSelect.value = window.INITIAL_MATH_CLASS;
            if (typeof updateTypeOptionsForClass === 'function') updateTypeOptionsForClass(window.INITIAL_MATH_CLASS);
            if (typeSelect && window.INITIAL_MATH_TYPE) typeSelect.value = window.INITIAL_MATH_TYPE;
            if (step1) step1.style.display = 'none'; if (step2) step2.style.display = 'none'; if (step3) step3.style.display = 'block'; if (step4) step4.style.display = 'none'; if (questionCountTitle) questionCountTitle.textContent = 'Настройки теста — Шаг 1/2'; if (speedTitle) speedTitle.textContent = 'Настройки теста — Шаг 2/2';
        });
    </script>
</body>
</html>
