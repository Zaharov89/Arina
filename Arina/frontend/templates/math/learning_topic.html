<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ topic.title }} — Математика 1 класс</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='math/learning.css') }}">
</head>
<body>
    <div id="dateTimeBar"></div>
    <div class="container">
        <div class="learning-topic-box">
            <h1 class="subject-title">{{ topic.title }}</h1>
            <p class="topic-lead">{{ topic.description }}</p>

            <div id="learningVoiceContent">
                <h2>Правила</h2>
                <ul class="rules-list">
                    {% for rule in topic.rules %}
                        <li>{{ rule }}</li>
                    {% endfor %}
                </ul>

                <h2>Примеры</h2>
                <div class="examples-list">
                    {% for example in topic.examples %}
                        <div class="example-card">{{ example }}</div>
                    {% endfor %}
                </div>
            </div>

            <div class="learning-voice-row">
                <button class="learning-voice-btn" type="button" onclick="speakLearningContent('learningVoiceContent')">🔊 Прослушать правила и примеры</button>
            </div>
        </div>

        <div class="learning-actions">
            <a href="/math/test_setup?student={{ student }}&class=1&type={{ topic_id }}" class="learning-btn test-link">Тренироваться по теме</a>
            <a href="/math/learning?student={{ student }}" class="learning-btn secondary-link">К темам обучения</a>
            <a href="/math?student={{ student }}" class="learning-btn back-link">Назад в математику</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/question-voice.js') }}"></script>
    <script src="{{ url_for('static', filename='js/math-common.js') }}"></script>
</body>
</html>
